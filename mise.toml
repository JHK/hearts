[tools]
go = "latest"
node = "lts"
ko = "latest"

[tasks.setup]
run = ["npm install", "go mod download"]

[tasks.fmt]
run = ["go fix ./...", "gofmt -w cmd internal"]

[tasks.test]
run = "go test ./..."

[tasks.css]
run = "npm run build:css"

[tasks.serve]
depends = ["css"]
run = "go run ./cmd/hearts -dev"
sources = ["**/*.go", "internal/**/*.html", "internal/**/*.js", "internal/webui/assets/styles.input.css"]

[tasks.dev]
depends = ["setup"]
run = "mise watch serve --restart"

[tasks.image-build]
description = "Build container image and load into local podman/docker daemon"
depends = ["css"]
run = "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock ko build --local ./cmd/hearts"

[tasks.image-push]
description = "Build and push container image to docker.io/julianknocke/hearts"
depends = ["css"]
run = """
IMAGE=$(DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock ko build --local ./cmd/hearts)
podman push "$IMAGE" docker.io/julianknocke/hearts:latest
"""
