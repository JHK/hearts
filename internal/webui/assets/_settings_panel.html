{{define "settings_panel"}}
<label class="settings-row">
  <span data-i18n="settings.playerName">settings.playerName</span>
  <input id="nameInput" data-i18n-placeholder="settings.playerName" placeholder="settings.playerName" class="settings-name-input" />
</label>
<label class="settings-row">
  <span data-i18n="settings.fastAnimations">settings.fastAnimations</span>
  <span class="settings-switch">
    <input id="speedToggle" type="checkbox" />
    <span class="settings-switch-track"></span>
  </span>
</label>
<label class="settings-row">
  <span data-i18n="settings.sound">settings.sound</span>
  <span class="settings-switch">
    <input id="soundToggle" type="checkbox" checked />
    <span class="settings-switch-track"></span>
  </span>
</label>
<label class="settings-row">
  <span data-i18n="settings.turnNotifications">settings.turnNotifications</span>
  <span class="settings-switch">
    <input id="notifyToggle" type="checkbox" />
    <span class="settings-switch-track"></span>
  </span>
</label>
<label class="settings-row">
  <span data-i18n="settings.language">settings.language</span>
  <select id="localeSelect" class="settings-select"></select>
</label>
{{end}}
