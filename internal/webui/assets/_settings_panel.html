{{define "settings_panel"}}
<label class="settings-row">
  <span>Player name</span>
  <input id="nameInput" placeholder="Player name" class="settings-name-input" />
</label>
<label class="settings-row">
  <span>Fast animations</span>
  <span class="settings-switch">
    <input id="speedToggle" type="checkbox" />
    <span class="settings-switch-track"></span>
  </span>
</label>
<label class="settings-row">
  <span>Sound</span>
  <span class="settings-switch">
    <input id="soundToggle" type="checkbox" checked />
    <span class="settings-switch-track"></span>
  </span>
</label>
<label class="settings-row">
  <span>Turn notifications</span>
  <span class="settings-switch">
    <input id="notifyToggle" type="checkbox" />
    <span class="settings-switch-track"></span>
  </span>
</label>
{{end}}
