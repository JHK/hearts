<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hearts Table</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body class="table-page">
  <main>
    <section>
      <div style="display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;">
        <h1><span id="title">Hearts Table</span> <span id="status" class="muted" title="waiting for players" aria-label="waiting for players">⌛</span></h1>
        <span id="turnIndicator" class="muted"></span>
      </div>
    </section>

    <section id="actionsSection">
      <h2>Actions</h2>
      <div class="row">
        <select id="strategy">
          <option value="">random</option>
          <option value="first-legal">first-legal</option>
        </select>
        <button id="addBot" class="secondary">Add Bot</button>
        <button id="start" class="secondary">Start</button>
      </div>
      <div id="result" class="muted" style="margin-top:8px;"></div>
    </section>

    <section id="trickSection">
      <h2>Trick</h2>
      <div class="table-board">
        <div id="seatTop" class="seat top">-</div>
        <div id="seatLeft" class="seat left">-</div>
        <div id="seatRight" class="seat right">-</div>
        <div id="seatBottom" class="seat bottom">-</div>
        <div id="trickCenter" class="trick-center"></div>
      </div>
    </section>

    <section id="yourHandSection">
      <h2>Your Hand</h2>
      <div id="yourName" class="muted" style="margin-bottom:8px;">you</div>
      <div id="yourHand" class="cards-row"></div>
    </section>

    <section id="otherHandsSection">
      <h2>Other Players' Hands</h2>
      <div id="otherHands" class="other-hands"></div>
    </section>

    <section>
      <details>
        <summary>Events</summary>
        <pre id="logs"></pre>
      </details>
    </section>

    <section>
      <a href="/">Back to lobby</a>
    </section>
  </main>

  <script>
    const nameKey = 'hearts.player.name';
    const tokenKey = 'hearts.player.token';

    const tableId = decodeURIComponent(location.pathname.replace('/table/', ''));
    const titleEl = document.getElementById('title');
    const statusEl = document.getElementById('status');
    const turnIndicatorEl = document.getElementById('turnIndicator');
    const yourNameEl = document.getElementById('yourName');
    const resultEl = document.getElementById('result');
    const logsEl = document.getElementById('logs');
    const strategyEl = document.getElementById('strategy');
    const actionsSectionEl = document.getElementById('actionsSection');
    const trickSectionEl = document.getElementById('trickSection');
    const yourHandSectionEl = document.getElementById('yourHandSection');
    const otherHandsSectionEl = document.getElementById('otherHandsSection');
    const yourHandEl = document.getElementById('yourHand');
    const otherHandsEl = document.getElementById('otherHands');
    const trickCenterEl = document.getElementById('trickCenter');
    const seatTopEl = document.getElementById('seatTop');
    const seatLeftEl = document.getElementById('seatLeft');
    const seatRightEl = document.getElementById('seatRight');
    const seatBottomEl = document.getElementById('seatBottom');
    const trickSlotEls = createTrickSlots();

    titleEl.textContent = `Hearts Table ${tableId}`;

    function playerName() {
      const stored = (localStorage.getItem(nameKey) || '').trim();
      return stored || 'Player';
    }

    function ensureToken() {
      let token = localStorage.getItem(tokenKey);
      if (!token) {
        token = (self.crypto && self.crypto.randomUUID)
          ? self.crypto.randomUUID()
          : String(Date.now()) + Math.random().toString(16).slice(2);
        localStorage.setItem(tokenKey, token);
      }
      return token;
    }

    function isRedCard(card) {
      if (!card || card.length < 2) return false;
      const suit = card.slice(-1);
      return suit === 'H' || suit === 'D';
    }

    function decodeCard(card) {
      if (!card || card.length < 2) {
        return { rank: '', suit: '', glyph: '' };
      }

      const rank = card.slice(0, -1);
      const suit = card.slice(-1);
      const glyphBySuit = {
        S: '\u2660',
        H: '\u2665',
        D: '\u2666',
        C: '\u2663'
      };

      return {
        rank,
        suit,
        glyph: glyphBySuit[suit] || suit
      };
    }

    function setSeatTurnClass(el, player, turnPlayerId) {
      if (player && turnPlayerId && player.player_id === turnPlayerId) {
        el.classList.add('turn');
      } else {
        el.classList.remove('turn');
      }
    }

    function setSeatLabels(players, turnPlayerId) {
      const me = players.find((p) => p.player_id === myPlayerId);
      if (!me) {
        seatTopEl.textContent = '-';
        seatLeftEl.textContent = '-';
        seatRightEl.textContent = '-';
        seatBottomEl.textContent = '-';
        seatTopEl.classList.remove('turn');
        seatLeftEl.classList.remove('turn');
        seatRightEl.classList.remove('turn');
        seatBottomEl.classList.remove('turn');
        return;
      }

      const bySeat = new Map();
      for (const player of players) {
        bySeat.set(player.seat, player);
      }

      function atOffset(offset) {
        const seat = (me.seat + offset + 4) % 4;
        return bySeat.get(seat);
      }

      const top = atOffset(2);
      const left = atOffset(1);
      const right = atOffset(3);

      seatTopEl.textContent = top ? top.name : '-';
      seatLeftEl.textContent = left ? left.name : '-';
      seatRightEl.textContent = right ? right.name : '-';
      seatBottomEl.textContent = me.name;

      setSeatTurnClass(seatTopEl, top, turnPlayerId);
      setSeatTurnClass(seatLeftEl, left, turnPlayerId);
      setSeatTurnClass(seatRightEl, right, turnPlayerId);
      setSeatTurnClass(seatBottomEl, me, turnPlayerId);
    }

    function createTrickSlots() {
      const slots = {};
      const slotSpecs = [
        { key: 'top', className: 'trick-slot trick-slot-top' },
        { key: 'left', className: 'trick-slot trick-slot-left' },
        { key: 'right', className: 'trick-slot trick-slot-right' },
        { key: 'bottom', className: 'trick-slot trick-slot-bottom' }
      ];

      for (const spec of slotSpecs) {
        const slot = document.createElement('div');
        slot.className = spec.className;
        slot.dataset.slotKey = spec.key;
        trickCenterEl.appendChild(slot);
        slots[spec.key] = slot;
      }
      return slots;
    }

    function slotKeyFor(player, me) {
      if (!me || !player) {
        return '';
      }

      const offset = (player.seat - me.seat + 4) % 4;
      switch (offset) {
        case 0:
          return 'bottom';
        case 1:
          return 'left';
        case 2:
          return 'top';
        case 3:
          return 'right';
        default:
          return '';
      }
    }

    function buildTrickCard(cardValue) {
      const card = document.createElement('div');
      card.className = 'play-card';
      if (isRedCard(cardValue)) {
        card.classList.add('is-red');
      }

      const label = document.createElement('div');
      const cardInfo = decodeCard(cardValue);
      const cardLabel = `${cardInfo.rank}${cardInfo.glyph}`;
      label.className = 'label' + (isRedCard(cardValue) ? ' is-red' : '');
      label.textContent = cardLabel;
      card.dataset.cornerTop = cardLabel;
      card.dataset.cornerBottom = cardLabel;
      card.appendChild(label);

      return card;
    }

    function renderTrick(players, trickPlays) {
      const me = players.find((player) => player.player_id === myPlayerId);
      const trickSignature = `${me ? me.seat : '-'}|${(trickPlays || []).map((play) => `${play.player_id}:${play.card}`).join('|')}`;
      if (trickSignature === lastTrickSignature) {
        return;
      }

      lastTrickSignature = trickSignature;
      const byPlayer = new Map();
      for (const player of players) {
        byPlayer.set(player.player_id, player);
      }

      const desiredBySlot = {
        top: { signature: '', card: '' },
        left: { signature: '', card: '' },
        right: { signature: '', card: '' },
        bottom: { signature: '', card: '' }
      };

      for (const play of trickPlays || []) {
        const player = byPlayer.get(play.player_id);
        const slotKey = slotKeyFor(player, me);
        if (!slotKey) {
          continue;
        }

        desiredBySlot[slotKey] = {
          signature: `${play.player_id}:${play.card}`,
          card: play.card
        };
      }

      for (const slotKey of Object.keys(trickSlotEls)) {
        const slotEl = trickSlotEls[slotKey];
        const next = desiredBySlot[slotKey];
        const currentSignature = slotEl.dataset.playSignature || '';
        if (currentSignature === next.signature) {
          continue;
        }

        slotEl.dataset.playSignature = next.signature;
        slotEl.replaceChildren();
        if (!next.signature) {
          continue;
        }

        slotEl.appendChild(buildTrickCard(next.card));
      }
    }

    function renderYourHand(cards, isYourTurn) {
      yourHandEl.innerHTML = '';

      if (!cards || cards.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'muted';
        empty.textContent = '(empty)';
        yourHandEl.appendChild(empty);
        return;
      }

      for (const cardValue of cards) {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'hand-card' + (isRedCard(cardValue) ? ' is-red' : '');
        const cardInfo = decodeCard(cardValue);
        const cardLabel = `${cardInfo.rank}${cardInfo.glyph}`;
        card.dataset.cornerTop = cardLabel;
        card.dataset.cornerBottom = cardLabel;
        if (isYourTurn) {
          card.className += ' playable';
        }
        const value = document.createElement('span');
        value.className = 'card-value';
        value.textContent = cardLabel;
        card.appendChild(value);
        card.onclick = () => {
          send({ type: 'play', card: cardValue });
        };
        yourHandEl.appendChild(card);
      }
    }

    function renderOtherHands(players, handSizes) {
      otherHandsEl.innerHTML = '';

      const others = (players || []).filter((player) => player.player_id !== myPlayerId);
      if (others.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'muted';
        empty.textContent = 'No other players yet.';
        otherHandsEl.appendChild(empty);
        return;
      }

      for (const player of others) {
        const line = document.createElement('div');
        line.className = 'other-line';

        const title = document.createElement('div');
        const bot = player.is_bot ? ' [bot]' : '';
        const count = handSizes && handSizes[player.player_id] ? handSizes[player.player_id] : 0;
        title.textContent = `seat ${player.seat}: ${player.name}${bot} - ${count} cards`;

        const backRow = document.createElement('div');
        backRow.className = 'back-row';
        for (let i = 0; i < count; i += 1) {
          const back = document.createElement('div');
          back.className = 'back-card';
          backRow.appendChild(back);
        }

        line.appendChild(title);
        line.appendChild(backRow);
        otherHandsEl.appendChild(line);
      }
    }

    const token = ensureToken();
    let ws;
    let myPlayerId = '';
    let lastTrickSignature = '';
    let lastPlayers = [];
    let liveTrickPlays = [];
    let pendingStateRefresh = 0;
    let keepTrickVisibleUntil = 0;
    let lastCardPlayedAt = 0;

    function log(line) {
      const ts = new Date().toLocaleTimeString();
      logsEl.textContent += `[${ts}] ${line}\n`;
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function send(msg) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        return;
      }
      ws.send(JSON.stringify(msg));
    }

    function scheduleStateRefresh(delayMs) {
      if (pendingStateRefresh) {
        clearTimeout(pendingStateRefresh);
      }

      if (!delayMs || delayMs <= 0) {
        pendingStateRefresh = 0;
        requestState();
        return;
      }

      pendingStateRefresh = setTimeout(() => {
        pendingStateRefresh = 0;
        requestState();
      }, delayMs);
    }

    function requestState() {
      send({ type: 'state' });
    }

    function renderState(state) {
      const players = state.players || [];
      const waitingForPlayers = !state.started && players.length < 4;
      statusEl.hidden = !waitingForPlayers;
      if (waitingForPlayers) {
        statusEl.textContent = '⌛';
      }

      if (state.started) {
        actionsSectionEl.classList.add('hidden');
      } else {
        actionsSectionEl.classList.remove('hidden');
      }

      actionsSectionEl.hidden = state.started;
      yourHandSectionEl.hidden = !state.started;
      otherHandsSectionEl.hidden = !state.started;

      lastPlayers = players;
      const turnPlayer = players.find((player) => player.player_id === state.turn_player_id);
      const isYourTurn = !!state.started && !!myPlayerId && state.turn_player_id === myPlayerId;
      if (state.started) {
        turnIndicatorEl.textContent = isYourTurn
          ? 'waiting for you'
          : `waiting for ${turnPlayer ? turnPlayer.name : (state.turn_player_id || '-')}`;
      } else {
        turnIndicatorEl.textContent = '';
      }

      const me = players.find((player) => player.player_id === myPlayerId);
      yourNameEl.textContent = me ? me.name : 'you';
      const serverTrickPlays = (state.trick_plays || []).slice();
      const now = Date.now();
      const shouldHoldCompletedTrick =
        serverTrickPlays.length === 0 &&
        liveTrickPlays.length === 4 &&
        now < keepTrickVisibleUntil;
      const shouldHoldInFlightTrick =
        serverTrickPlays.length === 0 &&
        liveTrickPlays.length > 0 &&
        now - lastCardPlayedAt < 1000;

      if (!shouldHoldCompletedTrick && !shouldHoldInFlightTrick) {
        liveTrickPlays = serverTrickPlays;
      }

      setSeatLabels(players, state.turn_player_id);
      renderTrick(players, liveTrickPlays);
      renderYourHand(state.hand || [], isYourTurn);
      renderOtherHands(players, state.hand_sizes || {});

    }

    function seatElementForPlayerId(playerId) {
      if (!playerId || !lastPlayers || lastPlayers.length === 0) {
        return null;
      }

      const me = lastPlayers.find((player) => player.player_id === myPlayerId);
      const winner = lastPlayers.find((player) => player.player_id === playerId);
      if (!me || !winner) {
        return null;
      }

      const offset = (winner.seat - me.seat + 4) % 4;
      switch (offset) {
        case 0:
          return seatBottomEl;
        case 1:
          return seatLeftEl;
        case 2:
          return seatTopEl;
        case 3:
          return seatRightEl;
        default:
          return null;
      }
    }

    function animateTrickWinner(playerId) {
      const seatEl = seatElementForPlayerId(playerId);
      if (!seatEl) {
        return;
      }

      seatEl.classList.remove('trick-winner');
      void seatEl.offsetWidth;
      seatEl.classList.add('trick-winner');
      seatEl.addEventListener('animationend', () => {
        seatEl.classList.remove('trick-winner');
      }, { once: true });
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/ws/table/${encodeURIComponent(tableId)}`);

      ws.onopen = () => {
        log('connected');
        send({ type: 'join', name: playerName(), token });
        requestState();
      };

      ws.onclose = () => {
        log('disconnected, retrying...');
        setTimeout(connect, 1000);
      };

      ws.onerror = () => {
        log('websocket error');
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.error) {
          resultEl.textContent = `error: ${msg.error}`;
          log(`error: ${msg.error}`);
          return;
        }

        switch (msg.type) {
          case 'table_state':
            renderState(msg.data || {});
            break;
          case 'join_result':
            if (msg.data && msg.data.accepted) {
              myPlayerId = msg.data.player_id;
              resultEl.textContent = 'joined';
              log(`joined as ${myPlayerId} seat ${msg.data.seat}`);
            } else {
              resultEl.textContent = msg.data && msg.data.reason ? msg.data.reason : 'join rejected';
            }
            requestState();
            break;
          case 'start_result':
          case 'play_result':
            if (msg.data && msg.data.accepted) {
              resultEl.textContent = 'ok';
            } else {
              resultEl.textContent = msg.data && msg.data.reason ? msg.data.reason : 'rejected';
            }
            scheduleStateRefresh(0);
            break;
          case 'card_played':
            if (msg.data && msg.data.player_id && msg.data.card && lastPlayers.length > 0) {
              lastCardPlayedAt = Date.now();
              const nextTrick = liveTrickPlays.filter((play) => play.player_id !== msg.data.player_id);
              nextTrick.push({ player_id: msg.data.player_id, card: msg.data.card });
              liveTrickPlays = nextTrick;
              if (liveTrickPlays.length >= 4) {
                keepTrickVisibleUntil = Date.now() + 900;
              }
              renderTrick(lastPlayers, liveTrickPlays);
              scheduleStateRefresh(liveTrickPlays.length >= 4 ? 700 : 0);
            } else {
              scheduleStateRefresh(0);
            }
            break;
          case 'add_bot_result':
            resultEl.textContent = 'bot added';
            scheduleStateRefresh(0);
            break;
          case 'trick_completed':
            if (msg.data && msg.data.winner_player_id) {
              animateTrickWinner(msg.data.winner_player_id);
            }
            keepTrickVisibleUntil = Date.now() + 900;
            scheduleStateRefresh(900);
            break;
          default:
            log(`${msg.type}: ${JSON.stringify(msg.data || {})}`);
            scheduleStateRefresh(0);
            break;
        }
      };
    }

    document.getElementById('addBot').onclick = () => {
      send({ type: 'add_bot', strategy: strategyEl.value });
    };

    document.getElementById('start').onclick = () => {
      send({ type: 'start' });
    };

    connect();
  </script>
</body>
</html>
