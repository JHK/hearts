<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hearts Table</title>
  <link rel="stylesheet" href="{{.StylesURL}}" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
</head>
<body class="table-page">
  <main>
    {{define "page_header_back"}}
    <a href="/" class="page-header-back" aria-label="Back to lobby" title="Back to lobby">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M14.78 18.72a.75.75 0 0 1-1.06 0l-6.19-6.19a.75.75 0 0 1 0-1.06l6.19-6.19a.75.75 0 1 1 1.06 1.06L9.12 12l5.66 5.66a.75.75 0 0 1 0 1.06Z" />
      </svg>
    </a>
    {{end}}
    {{define "page_header_extra_actions"}}
    <div id="addBotContainer" class="settings-container hidden">
      <button id="addBotToggle" type="button" class="icon-btn" aria-label="Add bot" title="Add bot">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M17.753 14a2.25 2.25 0 0 1 2.25 2.25v.904A3.75 3.75 0 0 1 18.696 20c-1.565 1.344-3.75 2-6.696 2s-5.128-.656-6.69-2a3.75 3.75 0 0 1-1.307-2.846v-.904A2.25 2.25 0 0 1 6.253 14h11.5ZM11.9 2.006 12 2a.75.75 0 0 1 .743.648l.007.102v.5h3.5a2.25 2.25 0 0 1 2.25 2.25v4a2.25 2.25 0 0 1-2.25 2.25h-8.5A2.25 2.25 0 0 1 5.5 9.5v-4a2.25 2.25 0 0 1 2.25-2.25h3.5v-.5a.75.75 0 0 1 .65-.744ZM9.75 6.5a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5Zm4.5 0a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5Z" />
        </svg>
      </button>
      <div id="addBotPanel" class="settings-panel bot-strength-panel hidden">
        <button type="button" class="bot-strength-option" data-strategy="hard">Hard</button>
        <button type="button" class="bot-strength-option" data-strategy="medium">Medium</button>
        <button type="button" class="bot-strength-option" data-strategy="easy">Easy</button>
      </div>
    </div>
    {{end}}
    {{template "page_header"}}

    <div class="table-game-layout">
      <section id="trickSection">
        <div class="table-board">

          <div id="seatTop" class="seat top">
            <div id="seatTopName" class="seat-name">-</div>
            <div id="seatTopHand" class="seat-hand"></div>
          </div>
          <div id="seatLeft" class="seat left">
            <div id="seatLeftName" class="seat-name">-</div>
            <div id="seatLeftHand" class="seat-hand"></div>
          </div>
          <div id="seatRight" class="seat right">
            <div id="seatRightName" class="seat-name">-</div>
            <div id="seatRightHand" class="seat-hand"></div>
          </div>
          <div id="seatBottom" class="seat bottom">
            <div id="seatBottomName" class="seat-name">-</div>
            <div id="seatBottomHand" class="seat-hand"></div>
          </div>
          <div id="trickCenter" class="trick-center">
            <div id="centerControls" class="trick-center-controls hidden">
              <div id="passSummary" class="muted"></div>
              <div id="passDetails" class="muted" style="margin-top:6px;"></div>
              <div id="passSelection" class="muted" style="margin-top:6px;"></div>
              <div class="row center-controls-row" style="margin-top:8px;">
                <button id="start" class="felt-btn">Start</button>
                <button id="submitPass" class="felt-btn"></button>
                <button id="readyAfterPass" class="felt-btn">Continue</button>
              </div>
              <div id="gamePausedControls" class="hidden" aria-live="polite" style="text-align:center;">
                <p style="margin:0; font-weight:600;">Game Paused</p>
                <p id="gamePausedMessage" class="muted" style="margin:4px 0 0;"></p>
                <div id="gamePausedActions" style="margin-top:8px;"></div>
              </div>
            </div>
          </div>
          <div id="trickAnimationLayer" class="trick-animation-layer"></div>
        </div>
      </section>

      <section id="scoreboardSection" class="scoreboard-section">
        <h2>Scoreboard</h2>
        <div class="scoreboard-wrap">
          <table class="scoreboard-table" aria-label="Scoreboard">
            <thead id="scoreboardHead"></thead>
            <tbody id="scoreboardBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <div id="gameOverOverlay" class="overlay game-over-overlay hidden">
    <div class="overlay-panel game-over-panel">
      <h2>Game Over</h2>
      <div id="gameOverChart" class="game-over-chart">
        <canvas id="gameOverCanvas"></canvas>
      </div>
      <div id="gameOverScores" class="game-over-scores"></div>
      <button id="rematchButton" type="button" class="primary" hidden>Play Again</button>
      <a href="/" class="game-over-back-link">Back to Lobby</a>
    </div>
  </div>

  <script defer src="{{.ChartJSURL}}"></script>
  <script type="module" src="{{.ScriptURL}}"></script>
{{.ExtraScripts}}
</body>
</html>
