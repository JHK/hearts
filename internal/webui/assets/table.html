<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hearts Table</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body class="table-page">
  <main>
    <section>
      <div style="display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;">
        <h1><span id="title">Hearts Table</span> <span id="status" class="muted" title="waiting for players" aria-label="waiting for players">⌛</span></h1>
        <span id="turnIndicator" class="muted"></span>
      </div>
    </section>

    <section id="trickSection">
      <div class="table-board">
        <div id="botControl" class="bot-control hidden">
          <div class="bot-control-group">
            <button id="addBotDefault" type="button" class="secondary">Add Bot</button>
            <select id="botStrategySelect" class="bot-strategy-select" aria-label="Select bot strategy">
              <option value="" selected>random</option>
              <option value="first-legal">first-legal</option>
            </select>
          </div>
        </div>
        <div id="seatTop" class="seat top">
          <div id="seatTopName" class="seat-name">-</div>
          <div id="seatTopHand" class="seat-hand"></div>
        </div>
        <div id="seatLeft" class="seat left">
          <div id="seatLeftName" class="seat-name">-</div>
          <div id="seatLeftHand" class="seat-hand"></div>
        </div>
        <div id="seatRight" class="seat right">
          <div id="seatRightName" class="seat-name">-</div>
          <div id="seatRightHand" class="seat-hand"></div>
        </div>
        <div id="seatBottom" class="seat bottom">
          <div id="seatBottomName" class="seat-name">-</div>
          <div id="seatBottomHand" class="seat-hand"></div>
        </div>
        <div id="trickCenter" class="trick-center">
          <div id="centerControls" class="trick-center-controls hidden">
            <div id="passSummary" class="muted"></div>
            <div id="passDetails" class="muted" style="margin-top:6px;"></div>
            <div id="passSelection" class="muted" style="margin-top:6px;"></div>
            <div class="row center-controls-row" style="margin-top:8px;">
              <button id="start" class="secondary">Start</button>
              <button id="submitPass" class="secondary">Pass 3 Cards</button>
              <button id="readyAfterPass" class="secondary">Continue</button>
            </div>
          </div>
        </div>
        <div id="trickAnimationLayer" class="trick-animation-layer"></div>
      </div>
    </section>

    <section>
      <details>
        <summary>Events</summary>
        <pre id="logs"></pre>
      </details>
    </section>

    <section>
      <a href="/">Back to lobby</a>
    </section>
  </main>

  <script>
    const nameKey = 'hearts.player.name';
    const tokenKey = 'hearts.player.token';

    const tableId = decodeURIComponent(location.pathname.replace('/table/', ''));
    const titleEl = document.getElementById('title');
    const statusEl = document.getElementById('status');
    const turnIndicatorEl = document.getElementById('turnIndicator');
    const botControlEl = document.getElementById('botControl');
    const addBotDefaultEl = document.getElementById('addBotDefault');
    const botStrategySelectEl = document.getElementById('botStrategySelect');
    const logsEl = document.getElementById('logs');
    const startButtonEl = document.getElementById('start');
    const centerControlsEl = document.getElementById('centerControls');
    const passSummaryEl = document.getElementById('passSummary');
    const passDetailsEl = document.getElementById('passDetails');
    const passSelectionEl = document.getElementById('passSelection');
    const submitPassEl = document.getElementById('submitPass');
    const readyAfterPassEl = document.getElementById('readyAfterPass');
    const trickSectionEl = document.getElementById('trickSection');
    const trickCenterEl = document.getElementById('trickCenter');
    const trickAnimationLayerEl = document.getElementById('trickAnimationLayer');
    const seatTopEl = document.getElementById('seatTop');
    const seatTopNameEl = document.getElementById('seatTopName');
    const seatTopHandEl = document.getElementById('seatTopHand');
    const seatLeftEl = document.getElementById('seatLeft');
    const seatLeftNameEl = document.getElementById('seatLeftName');
    const seatLeftHandEl = document.getElementById('seatLeftHand');
    const seatRightEl = document.getElementById('seatRight');
    const seatRightNameEl = document.getElementById('seatRightName');
    const seatRightHandEl = document.getElementById('seatRightHand');
    const seatBottomEl = document.getElementById('seatBottom');
    const seatBottomNameEl = document.getElementById('seatBottomName');
    const seatBottomHandEl = document.getElementById('seatBottomHand');
    const trickSlotEls = createTrickSlots();

    titleEl.textContent = `Hearts Table ${tableId}`;

    function playerName() {
      const stored = (localStorage.getItem(nameKey) || '').trim();
      return stored || 'Player';
    }

    function ensureToken() {
      let token = localStorage.getItem(tokenKey);
      if (!token) {
        token = (self.crypto && self.crypto.randomUUID)
          ? self.crypto.randomUUID()
          : String(Date.now()) + Math.random().toString(16).slice(2);
        localStorage.setItem(tokenKey, token);
      }
      return token;
    }

    const rankNameByCode = {
      A: 'ace',
      K: 'king',
      Q: 'queen',
      J: 'jack',
      T: '10',
      '9': '9',
      '8': '8',
      '7': '7',
      '6': '6',
      '5': '5',
      '4': '4',
      '3': '3',
      '2': '2'
    };

    const suitNameByCode = {
      S: 'spades',
      H: 'hearts',
      D: 'diamonds',
      C: 'clubs'
    };

    function cardParts(cardValue) {
      if (!cardValue || cardValue.length < 2) {
        return { rank: '', suit: '' };
      }
      return {
        rank: cardValue.slice(0, -1),
        suit: cardValue.slice(-1)
      };
    }

    function cardImageURL(cardValue) {
      const parts = cardParts(cardValue);
      const rank = rankNameByCode[parts.rank];
      const suit = suitNameByCode[parts.suit];
      if (!rank || !suit) {
        return '';
      }

      return `/assets/cards/${rank}_of_${suit}.svg`;
    }

    function cardAltText(cardValue) {
      const parts = cardParts(cardValue);
      const rank = rankNameByCode[parts.rank] || parts.rank;
      const suit = suitNameByCode[parts.suit] || parts.suit;
      if (!rank || !suit) {
        return cardValue;
      }

      return `${rank} of ${suit}`;
    }

    function setSeatTurnClass(el, player, turnPlayerId) {
      if (player && turnPlayerId && player.player_id === turnPlayerId) {
        el.classList.add('turn');
      } else {
        el.classList.remove('turn');
      }
    }

    function relativeSeatPlayers(players) {
      const me = players.find((p) => p.player_id === myPlayerId);
      if (!me) {
        return { me: null, top: null, left: null, right: null };
      }

      const bySeat = new Map();
      for (const player of players) {
        bySeat.set(player.seat, player);
      }

      function atOffset(offset) {
        const seat = (me.seat + offset + 4) % 4;
        return bySeat.get(seat);
      }

      return {
        me,
        top: atOffset(2),
        left: atOffset(1),
        right: atOffset(3)
      };
    }

    function setSeatLabels(relativePlayers, turnPlayerId) {
      function displayName(player) {
        if (!player) {
          return '-';
        }

        return player.is_bot ? `${player.name} [bot]` : player.name;
      }

      if (!relativePlayers.me) {
        seatTopNameEl.textContent = '-';
        seatLeftNameEl.textContent = '-';
        seatRightNameEl.textContent = '-';
        seatBottomNameEl.textContent = '-';

        seatTopEl.classList.remove('turn');
        seatLeftEl.classList.remove('turn');
        seatRightEl.classList.remove('turn');
        seatBottomEl.classList.remove('turn');
        return;
      }

      seatTopNameEl.textContent = displayName(relativePlayers.top);
      seatLeftNameEl.textContent = displayName(relativePlayers.left);
      seatRightNameEl.textContent = displayName(relativePlayers.right);
      seatBottomNameEl.textContent = displayName(relativePlayers.me);

      setSeatTurnClass(seatTopEl, relativePlayers.top, turnPlayerId);
      setSeatTurnClass(seatLeftEl, relativePlayers.left, turnPlayerId);
      setSeatTurnClass(seatRightEl, relativePlayers.right, turnPlayerId);
      setSeatTurnClass(seatBottomEl, relativePlayers.me, turnPlayerId);
    }

    function createTrickSlots() {
      const slots = {};
      const slotSpecs = [
        { key: 'top', className: 'trick-slot trick-slot-top' },
        { key: 'left', className: 'trick-slot trick-slot-left' },
        { key: 'right', className: 'trick-slot trick-slot-right' },
        { key: 'bottom', className: 'trick-slot trick-slot-bottom' }
      ];

      for (const spec of slotSpecs) {
        const slot = document.createElement('div');
        slot.className = spec.className;
        slot.dataset.slotKey = spec.key;
        trickCenterEl.appendChild(slot);
        slots[spec.key] = slot;
      }
      return slots;
    }

    function slotKeyFor(player, me) {
      if (!me || !player) {
        return '';
      }

      const offset = (player.seat - me.seat + 4) % 4;
      switch (offset) {
        case 0:
          return 'bottom';
        case 1:
          return 'left';
        case 2:
          return 'top';
        case 3:
          return 'right';
        default:
          return '';
      }
    }

    function buildTrickCard(cardValue) {
      const card = document.createElement('div');
      card.className = 'play-card';
      const imageURL = cardImageURL(cardValue);
      if (!imageURL) {
        card.textContent = cardValue;
        return card;
      }

      const image = document.createElement('img');
      image.className = 'play-card-image';
      image.src = imageURL;
      image.alt = cardAltText(cardValue);
      image.loading = 'lazy';
      image.decoding = 'async';
      card.appendChild(image);

      return card;
    }

    function renderTrick(players, trickPlays) {
      const me = players.find((player) => player.player_id === myPlayerId);
      const trickSignature = `${me ? me.seat : '-'}|${(trickPlays || []).map((play) => `${play.player_id}:${play.card}`).join('|')}`;
      if (trickSignature === lastTrickSignature) {
        return;
      }

      lastTrickSignature = trickSignature;
      const byPlayer = new Map();
      for (const player of players) {
        byPlayer.set(player.player_id, player);
      }

      const desiredBySlot = {
        top: { signature: '', card: '' },
        left: { signature: '', card: '' },
        right: { signature: '', card: '' },
        bottom: { signature: '', card: '' }
      };

      for (const play of trickPlays || []) {
        const player = byPlayer.get(play.player_id);
        const slotKey = slotKeyFor(player, me);
        if (!slotKey) {
          continue;
        }

        desiredBySlot[slotKey] = {
          signature: `${play.player_id}:${play.card}`,
          card: play.card
        };
      }

      for (const slotKey of Object.keys(trickSlotEls)) {
        const slotEl = trickSlotEls[slotKey];
        const next = desiredBySlot[slotKey];
        const currentSignature = slotEl.dataset.playSignature || '';
        if (currentSignature === next.signature) {
          continue;
        }

        slotEl.dataset.playSignature = next.signature;
        slotEl.replaceChildren();
        if (!next.signature) {
          continue;
        }

        slotEl.appendChild(buildTrickCard(next.card));
      }
    }

    function renderYourHand(cards, phase, isYourTurn, passSubmitted, passReceived, passReady) {
      const safeCards = Array.isArray(cards) ? cards : [];
      const safePassReceived = Array.isArray(passReceived) ? passReceived : [];
      const receivedSet = new Set(safePassReceived);
      selectedPassCards = selectedPassCards.filter((card) => safeCards.includes(card));
      const handRenderKey = `${phase}|${isYourTurn ? '1' : '0'}|${passSubmitted ? '1' : '0'}|${passReady ? '1' : '0'}|${safePassReceived.join(',')}|${selectedPassCards.join(',')}|${safeCards.join(',')}`;
      if (handRenderKey === lastHandRenderKey) {
        return;
      }

      lastHandRenderKey = handRenderKey;
      seatBottomHandEl.innerHTML = '';

      if (safeCards.length === 0) {
        return;
      }

      for (const cardValue of safeCards) {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'hand-card';
        if (phase === 'playing' && isYourTurn) {
          card.className += ' playable';
        }
        if (phase === 'passing' && !passSubmitted) {
          card.className += ' pass-selectable';
        }
        if (selectedPassCards.includes(cardValue)) {
          card.className += ' selected';
        }
        if (phase === 'pass_review' && !passReady && receivedSet.has(cardValue)) {
          card.className += ' selected';
        }

        const imageURL = cardImageURL(cardValue);
        if (imageURL) {
          const image = document.createElement('img');
          image.className = 'hand-card-image';
          image.src = imageURL;
          image.alt = cardAltText(cardValue);
          image.loading = 'lazy';
          image.decoding = 'async';
          card.appendChild(image);
        } else {
          card.textContent = cardValue;
        }

        card.onclick = () => {
          if (phase === 'passing' && !passSubmitted) {
            const selected = selectedPassCards.includes(cardValue);
            if (selected) {
              selectedPassCards = selectedPassCards.filter((card) => card !== cardValue);
            } else if (selectedPassCards.length < 3) {
              selectedPassCards = [...selectedPassCards, cardValue];
            }
            renderYourHand(safeCards, phase, isYourTurn, passSubmitted);
            renderPassPanel(lastSnapshot);
            return;
          }

          if (phase === 'playing') {
            send({ type: 'play', card: cardValue });
          }
        };
        seatBottomHandEl.appendChild(card);
      }
    }

    function renderSeatBackHand(container, count) {
      container.innerHTML = '';
      for (let i = 0; i < count; i += 1) {
        const back = document.createElement('div');
        back.className = 'back-card';
        container.appendChild(back);
      }
    }

    function renderOtherHands(relativePlayers, handSizes) {
      const seats = [
        { player: relativePlayers.top, container: seatTopHandEl },
        { player: relativePlayers.left, container: seatLeftHandEl },
        { player: relativePlayers.right, container: seatRightHandEl }
      ];

      for (const seat of seats) {
        if (!seat.player) {
          seat.container.innerHTML = '';
          continue;
        }

        const count = handSizes && handSizes[seat.player.player_id] ? handSizes[seat.player.player_id] : 0;
        renderSeatBackHand(seat.container, count);
      }
    }

    function formatCardList(cards) {
      if (!Array.isArray(cards) || cards.length === 0) {
        return '-';
      }

      return cards.join(', ');
    }

    function renderPassPanel(state) {
      const phase = state && state.phase ? state.phase : '';
      const passSubmitted = !!(state && state.pass_submitted);
      const passReady = !!(state && state.pass_ready);

      if (phase !== 'passing' && phase !== 'pass_review') {
        passSummaryEl.textContent = '';
        passDetailsEl.textContent = '';
        passSelectionEl.textContent = '';
        passSummaryEl.hidden = true;
        passDetailsEl.hidden = true;
        passSelectionEl.hidden = true;
        submitPassEl.hidden = true;
        readyAfterPassEl.hidden = true;
        return;
      }

      passSummaryEl.textContent = '';
      passDetailsEl.textContent = '';
      passSelectionEl.textContent = '';
      passSummaryEl.hidden = true;
      passDetailsEl.hidden = true;
      passSelectionEl.hidden = true;

      if (phase === 'passing') {
        submitPassEl.hidden = false;
        submitPassEl.disabled = passSubmitted || selectedPassCards.length !== 3;
        readyAfterPassEl.hidden = true;
        return;
      }

      submitPassEl.hidden = true;
      readyAfterPassEl.hidden = false;
      readyAfterPassEl.disabled = passReady;
    }

    const token = ensureToken();
    const trickCardInDurationMs = 520;
    const trickCardInBufferMs = 80;
    let ws;
    let myPlayerId = '';
    let lastTrickSignature = '';
    let lastHandRenderKey = '';
    let lastSnapshot = {};
    let selectedPassCards = [];
    let lastPlayers = [];
    let liveTrickPlays = [];
    let trickEventQueue = [];
    let processingTrickEventQueue = false;
    let pendingStateRefresh = 0;
    let lastPhase = '';
    let lastPassSubmittedCount = -1;
    let lastPassReadyCount = -1;
    let loggedPassReviewKey = '';

    function waitMs(durationMs) {
      if (!durationMs || durationMs <= 0) {
        return Promise.resolve();
      }

      return new Promise((resolve) => {
        window.setTimeout(resolve, durationMs);
      });
    }

    function prefersReducedMotion() {
      return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    }

    function trickRenderPlayers() {
      if (Array.isArray(lastPlayers) && lastPlayers.length > 0) {
        return lastPlayers;
      }
      if (lastSnapshot && Array.isArray(lastSnapshot.players)) {
        return lastSnapshot.players;
      }

      return [];
    }

    function syncTrickFromLatestSnapshot() {
      if (processingTrickEventQueue || trickEventQueue.length > 0) {
        return;
      }

      const players = trickRenderPlayers();
      if (players.length === 0) {
        return;
      }

      const snapshotTrickPlays = Array.isArray(lastSnapshot && lastSnapshot.trick_plays)
        ? lastSnapshot.trick_plays.slice()
        : [];
      liveTrickPlays = snapshotTrickPlays;
      renderTrick(players, liveTrickPlays);
    }

    function enqueueTrickEvent(type, data) {
      trickEventQueue.push({ type, data: data || {} });
      void processTrickEventQueue();
    }

    async function processQueuedCardPlayed(data) {
      if (!data || !data.player_id || !data.card) {
        return;
      }

      const players = trickRenderPlayers();
      if (players.length === 0) {
        return;
      }

      const nextTrick = liveTrickPlays.filter((play) => play.player_id !== data.player_id);
      nextTrick.push({ player_id: data.player_id, card: data.card });
      liveTrickPlays = nextTrick;
      renderTrick(players, liveTrickPlays);

      if (!prefersReducedMotion()) {
        await waitMs(trickCardInDurationMs + trickCardInBufferMs);
      }
    }

    async function processQueuedTrickCompleted(data) {
      if (data && data.winner_player_id) {
        await animateTrickCardsToWinner(data.winner_player_id);
      }

      liveTrickPlays = [];
      lastTrickSignature = '';

      const players = trickRenderPlayers();
      if (players.length > 0) {
        renderTrick(players, liveTrickPlays);
      }
    }

    async function processTrickEventQueue() {
      if (processingTrickEventQueue) {
        return;
      }

      processingTrickEventQueue = true;
      try {
        while (trickEventQueue.length > 0) {
          const queued = trickEventQueue.shift();
          if (!queued) {
            continue;
          }

          if (queued.type === 'card_played') {
            await processQueuedCardPlayed(queued.data);
            continue;
          }

          if (queued.type === 'trick_completed') {
            await processQueuedTrickCompleted(queued.data);
          }
        }
      } finally {
        processingTrickEventQueue = false;
        syncTrickFromLatestSnapshot();
      }
    }

    function log(line) {
      const ts = new Date().toLocaleTimeString();
      logsEl.textContent += `[${ts}] ${line}\n`;
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function send(msg) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        return;
      }
      ws.send(JSON.stringify(msg));
    }

    function scheduleStateRefresh(delayMs) {
      if (pendingStateRefresh) {
        clearTimeout(pendingStateRefresh);
      }

      if (!delayMs || delayMs <= 0) {
        pendingStateRefresh = 0;
        requestState();
        return;
      }

      pendingStateRefresh = setTimeout(() => {
        pendingStateRefresh = 0;
        requestState();
      }, delayMs);
    }

    function requestState() {
      send({ type: 'state' });
    }

    function renderState(state) {
      lastSnapshot = state || {};
      const players = state.players || [];
      const phase = state.phase || (state.started ? 'playing' : '');
      const isPassing = phase === 'passing';
      const isPassReview = phase === 'pass_review';
      const isPlaying = phase === 'playing';
      const passSubmittedCount = (state && state.pass_submitted_count) || 0;
      const passReadyCount = (state && state.pass_ready_count) || 0;
      const totalPoints = (state && state.total_points) || {};

      if (phase !== lastPhase) {
        if (phase === 'passing') {
          log(`pass phase started (${(state && state.pass_direction) || 'left'})`);
        } else if (phase === 'pass_review') {
          log('pass complete');
        }
      }
      if (isPassing && passSubmittedCount !== lastPassSubmittedCount) {
        log(`pass submissions: ${passSubmittedCount}/4`);
      }
      if (isPassReview && passReadyCount !== lastPassReadyCount) {
        log(`ready after pass: ${passReadyCount}/4`);
      }
      if (isPassReview) {
        const reviewKey = `${formatCardList(state.pass_sent || [])}|${formatCardList(state.pass_received || [])}`;
        if (reviewKey !== loggedPassReviewKey) {
          log(`you passed: ${formatCardList(state.pass_sent || [])}`);
          log(`you received: ${formatCardList(state.pass_received || [])}`);
          loggedPassReviewKey = reviewKey;
        }
      }
      if (!isPassReview) {
        loggedPassReviewKey = '';
      }
      lastPhase = phase;
      lastPassSubmittedCount = passSubmittedCount;
      lastPassReadyCount = passReadyCount;

      const waitingForPlayers = !state.started && players.length < 4;
      statusEl.hidden = !waitingForPlayers;
      if (waitingForPlayers) {
        statusEl.textContent = '⌛';
      }

      trickSectionEl.hidden = false;

      const canAddBot = !state.started && players.length < 4;
      botControlEl.classList.toggle('hidden', !canAddBot);
      if (!canAddBot) {
        botStrategySelectEl.value = '';
      }

      const showStartControl = !state.started && players.length === 4;
      const showPassControls = isPassing || isPassReview;
      centerControlsEl.classList.toggle('hidden', !showStartControl && !showPassControls);
      startButtonEl.hidden = !showStartControl;
      startButtonEl.disabled = !showStartControl;
      const hasCompletedRound = Object.values(totalPoints).some((points) => Number(points) > 0);
      startButtonEl.textContent = hasCompletedRound ? 'Continue' : 'Start';

      lastPlayers = players;
      const relativePlayers = relativeSeatPlayers(players);
      const turnPlayer = players.find((player) => player.player_id === state.turn_player_id);
      const isYourTurn = !!isPlaying && !!myPlayerId && state.turn_player_id === myPlayerId;
      if (isPlaying) {
        if (!state.turn_player_id) {
          turnIndicatorEl.textContent = 'collecting trick';
        } else {
          turnIndicatorEl.textContent = isYourTurn
            ? 'waiting for you'
            : `waiting for ${turnPlayer ? turnPlayer.name : state.turn_player_id}`;
        }
      } else if (isPassing) {
        turnIndicatorEl.textContent = `pass 3 cards ${state.pass_direction ? `(${state.pass_direction})` : ''}`.trim();
      } else if (isPassReview) {
        turnIndicatorEl.textContent = 'waiting for players to continue';
      } else {
        turnIndicatorEl.textContent = '';
      }

      const serverTrickPlays = (state.trick_plays || []).slice();
      if (!processingTrickEventQueue && trickEventQueue.length === 0) {
        liveTrickPlays = serverTrickPlays;
      }

      setSeatLabels(relativePlayers, state.turn_player_id);
      renderTrick(players, liveTrickPlays);
      renderYourHand(
        state.hand || [],
        phase,
        isYourTurn,
        !!state.pass_submitted,
        state.pass_received || [],
        !!state.pass_ready
      );
      renderOtherHands(relativePlayers, state.hand_sizes || {});
      renderPassPanel(state);

    }

    function seatElementForPlayerId(playerId) {
      if (!playerId || !lastPlayers || lastPlayers.length === 0) {
        return null;
      }

      const me = lastPlayers.find((player) => player.player_id === myPlayerId);
      const winner = lastPlayers.find((player) => player.player_id === playerId);
      if (!me || !winner) {
        return null;
      }

      const offset = (winner.seat - me.seat + 4) % 4;
      switch (offset) {
        case 0:
          return seatBottomEl;
        case 1:
          return seatLeftEl;
        case 2:
          return seatTopEl;
        case 3:
          return seatRightEl;
        default:
          return null;
      }
    }

    function seatNameElementForPlayerId(playerId) {
      if (!playerId || !lastPlayers || lastPlayers.length === 0) {
        return null;
      }

      const me = lastPlayers.find((player) => player.player_id === myPlayerId);
      const winner = lastPlayers.find((player) => player.player_id === playerId);
      if (!me || !winner) {
        return null;
      }

      const offset = (winner.seat - me.seat + 4) % 4;
      switch (offset) {
        case 0:
          return seatBottomNameEl;
        case 1:
          return seatLeftNameEl;
        case 2:
          return seatTopNameEl;
        case 3:
          return seatRightNameEl;
        default:
          return null;
      }
    }

    function textVisualRect(el) {
      if (!el) {
        return null;
      }

      const text = (el.textContent || '').trim();
      if (!text) {
        return el.getBoundingClientRect();
      }

      const range = document.createRange();
      range.selectNodeContents(el);
      const rect = range.getBoundingClientRect();
      range.detach?.();

      if (!rect || rect.width === 0 || rect.height === 0) {
        return el.getBoundingClientRect();
      }

      return rect;
    }

    function animateTrickWinner(playerId) {
      const seatEl = seatElementForPlayerId(playerId);
      if (!seatEl) {
        return;
      }

      seatEl.classList.remove('trick-winner');
      void seatEl.offsetWidth;
      seatEl.classList.add('trick-winner');
      seatEl.addEventListener('animationend', () => {
        seatEl.classList.remove('trick-winner');
      }, { once: true });
    }

    function animateTrickCardsToWinner(playerId) {
      return new Promise((resolve) => {
        const seatEl = seatElementForPlayerId(playerId);
        const seatNameEl = seatNameElementForPlayerId(playerId);
        if (!seatEl || !seatNameEl || !trickAnimationLayerEl) {
          animateTrickWinner(playerId);
          resolve();
          return;
        }
        const nameRect = seatNameEl.getBoundingClientRect();
        const textRect = textVisualRect(seatNameEl) || nameRect;
        const targetCenterX = textRect.left + (textRect.width / 2);
        const targetCenterY = textRect.top + (textRect.height / 2);
        const reduceMotion = prefersReducedMotion();

        const animatedCards = [];
        const slotEntries = Object.entries(trickSlotEls);
        for (const [slotKey, slotEl] of slotEntries) {
          const cardEl = slotEl.querySelector('.play-card');
          if (!cardEl) {
            continue;
          }

          const cardRect = cardEl.getBoundingClientRect();
          const clone = cardEl.cloneNode(true);
          clone.classList.add('trick-capture-card');
          clone.style.left = `${cardRect.left}px`;
          clone.style.top = `${cardRect.top}px`;
          clone.style.width = `${cardRect.width}px`;
          clone.style.height = `${cardRect.height}px`;
          trickAnimationLayerEl.appendChild(clone);

          animatedCards.push({
            el: clone,
            slotKey,
            centerX: cardRect.left + (cardRect.width / 2),
            centerY: cardRect.top + (cardRect.height / 2)
          });

          slotEl.replaceChildren();
          slotEl.dataset.playSignature = '';
        }

        if (animatedCards.length === 0) {
          animateTrickWinner(playerId);
          resolve();
          return;
        }

        if (reduceMotion) {
          for (const card of animatedCards) {
            card.el.remove();
          }
          animateTrickWinner(playerId);
          resolve();
          return;
        }

        const durationMs = 1400;
        const staggerMs = 90;
        const sortPriorityBySlot = { top: 0, left: 1, right: 2, bottom: 3 };
        animatedCards.sort((a, b) => (sortPriorityBySlot[a.slotKey] || 0) - (sortPriorityBySlot[b.slotKey] || 0));

        requestAnimationFrame(() => {
          animatedCards.forEach((card, index) => {
            const deltaX = targetCenterX - card.centerX;
            const deltaY = targetCenterY - card.centerY;
            const angle = (index - ((animatedCards.length - 1) / 2)) * 7;
            card.el.style.transitionDelay = `${index * staggerMs}ms`;
            card.el.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(0.56) rotate(${angle}deg)`;
            card.el.style.opacity = '0';
          });
        });

        window.setTimeout(() => {
          for (const card of animatedCards) {
            card.el.remove();
          }
          animateTrickWinner(playerId);
          resolve();
        }, durationMs + (animatedCards.length - 1) * staggerMs + 80);
      });
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/ws/table/${encodeURIComponent(tableId)}`);

      ws.onopen = () => {
        log('connected');
        send({ type: 'join', name: playerName(), token });
        requestState();
      };

      ws.onclose = () => {
        log('disconnected, retrying...');
        setTimeout(connect, 1000);
      };

      ws.onerror = () => {
        log('websocket error');
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.error) {
          log(`error: ${msg.error}`);
          return;
        }

        switch (msg.type) {
          case 'table_state':
            renderState(msg.data || {});
            break;
          case 'join_result':
            if (msg.data && msg.data.accepted) {
              myPlayerId = msg.data.player_id;
              log(`joined as ${myPlayerId} seat ${msg.data.seat}`);
            } else {
              log(`join rejected: ${msg.data && msg.data.reason ? msg.data.reason : 'join rejected'}`);
            }
            requestState();
            break;
          case 'start_result':
          case 'play_result':
          case 'pass_result':
          case 'ready_after_pass_result':
            if (msg.data && msg.data.accepted) {
              log(`${msg.type}: ok`);
              if (msg.type === 'pass_result') {
                selectedPassCards = [];
              }
            } else {
              log(`${msg.type}: ${msg.data && msg.data.reason ? msg.data.reason : 'rejected'}`);
            }
            scheduleStateRefresh(0);
            break;
          case 'card_played':
            enqueueTrickEvent('card_played', msg.data || {});
            scheduleStateRefresh(0);
            break;
          case 'add_bot_result':
            log('bot added');
            scheduleStateRefresh(0);
            break;
          case 'trick_completed':
            enqueueTrickEvent('trick_completed', msg.data || {});
            scheduleStateRefresh(0);
            break;
          default:
            log(`${msg.type}: ${JSON.stringify(msg.data || {})}`);
            scheduleStateRefresh(0);
            break;
        }
      };
    }

    addBotDefaultEl.onclick = () => {
      send({ type: 'add_bot', strategy: botStrategySelectEl.value || '' });
      botStrategySelectEl.value = '';
    };

    startButtonEl.onclick = () => {
      send({ type: 'start' });
    };

    submitPassEl.onclick = () => {
      if (selectedPassCards.length !== 3) {
        return;
      }
      send({ type: 'pass', cards: selectedPassCards });
    };

    readyAfterPassEl.onclick = () => {
      send({ type: 'ready_after_pass' });
    };

    connect();
  </script>
</body>
</html>
