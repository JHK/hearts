<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hearts Table</title>
  <link rel="stylesheet" href="{{.StylesURL}}" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
</head>
<body class="table-page">
  <main>
    <section>
      <div class="table-header">
        <div class="table-header-main">
          <h1><span id="title">Hearts Table</span> <span id="status" class="muted" title="waiting for players" aria-label="waiting for players">⌛</span> <span id="observerBadge" class="muted" hidden>· observing</span></h1>
          <span id="turnIndicator" class="muted"></span>
        </div>
        <div class="table-header-actions">
          <div class="settings-container">
            <button id="settingsToggle" type="button" class="settings-toggle" aria-label="Settings" title="Settings">
              <svg class="settings-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94c0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.3.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58ZM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2Z" />
              </svg>
            </button>
            <div id="settingsPanel" class="settings-panel hidden">
              {{template "settings_panel"}}
            </div>
          </div>
          <a href="/" class="table-header-back" aria-label="Back to lobby" title="Back to lobby">
            <svg class="table-header-back-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M14.78 18.72a.75.75 0 0 1-1.06 0l-6.19-6.19a.75.75 0 0 1 0-1.06l6.19-6.19a.75.75 0 1 1 1.06 1.06L9.12 12l5.66 5.66a.75.75 0 0 1 0 1.06Z" />
            </svg>
          </a>
        </div>
      </div>
    </section>

    <div class="table-game-layout">
      <section id="trickSection">
        <div class="table-board">
          <div id="botControl" class="bot-control hidden">
            <div class="bot-control-group">
              <button id="addBotDefault" type="button" class="secondary">Add Bot</button>
              <select id="botStrategySelect" class="bot-strategy-select" aria-label="Select bot strategy">
                <option value="hard" selected>hard</option>
                <option value="medium">medium</option>
                <option value="easy">easy</option>
                <option value="random">random</option>
                <option value="first-legal">first-legal</option>
              </select>
            </div>
          </div>
          <div id="seatTop" class="seat top">
            <div id="seatTopName" class="seat-name">-</div>
            <div id="seatTopHand" class="seat-hand"></div>
          </div>
          <div id="seatLeft" class="seat left">
            <div id="seatLeftName" class="seat-name">-</div>
            <div id="seatLeftHand" class="seat-hand"></div>
          </div>
          <div id="seatRight" class="seat right">
            <div id="seatRightName" class="seat-name">-</div>
            <div id="seatRightHand" class="seat-hand"></div>
          </div>
          <div id="seatBottom" class="seat bottom">
            <div id="seatBottomName" class="seat-name">-</div>
            <div id="seatBottomHand" class="seat-hand"></div>
          </div>
          <div id="trickCenter" class="trick-center">
            <div id="centerControls" class="trick-center-controls hidden">
              <div id="passSummary" class="muted"></div>
              <div id="passDetails" class="muted" style="margin-top:6px;"></div>
              <div id="passSelection" class="muted" style="margin-top:6px;"></div>
              <div class="row center-controls-row" style="margin-top:8px;">
                <button id="start" class="secondary">Start</button>
                <button id="submitPass" class="secondary"></button>
                <button id="readyAfterPass" class="secondary">Continue</button>
              </div>
            </div>
          </div>
          <div id="trickAnimationLayer" class="trick-animation-layer"></div>
        </div>
      </section>

      <section id="scoreboardSection" class="scoreboard-section">
        <h2>Scoreboard</h2>
        <div class="scoreboard-wrap">
          <table class="scoreboard-table" aria-label="Scoreboard">
            <thead id="scoreboardHead"></thead>
            <tbody id="scoreboardBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <div id="gamePausedOverlay" class="game-paused-overlay hidden">
    <div class="game-paused-panel">
      <h2>Game Paused</h2>
      <p id="gamePausedMessage" class="game-paused-message"></p>
      <div id="gamePausedActions" class="game-paused-actions"></div>
    </div>
  </div>

  <div id="gameOverOverlay" class="game-over-overlay hidden">
    <div class="game-over-panel">
      <h2>Game Over</h2>
      <div id="gameOverChart" class="game-over-chart">
        <canvas id="gameOverCanvas"></canvas>
      </div>
      <div id="gameOverScores" class="game-over-scores"></div>
      <button id="rematchButton" type="button" class="primary" hidden>Play Again</button>
      <a href="/" class="game-over-back-link">Back to Lobby</a>
    </div>
  </div>

  <script defer src="{{.ChartJSURL}}"></script>
  <script type="module" src="{{.ScriptURL}}"></script>
{{.ExtraScripts}}
</body>
</html>
