<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hearts Lobby</title>
  <link rel="stylesheet" href="{{.StylesURL}}" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
</head>
<body class="lobby-page">
  <main>
    <section>
      <h1>Hearts Lobby</h1>
      <p class="muted">Set your player name, create a table, or pick one from Open Tables.</p>
      <div class="row">
        <input id="name" placeholder="Player name" />
      </div>
    </section>

    <section>
      <h2>Create Table</h2>
      <div class="row">
        <input id="newTableId" placeholder="Optional table id" />
        <button id="createTable">Create</button>
      </div>
      <div id="createResult" class="muted" style="margin-top:8px;"></div>
    </section>

    <section id="presenceSection" style="display:none;">
      <p id="presenceText" class="muted"></p>
    </section>

    <section>
      <h2>Open Tables</h2>
      <ul id="tables"></ul>
    </section>
  </main>

  <script src="{{.ScriptURL}}" defer></script>
</body>
</html>
