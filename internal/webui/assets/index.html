<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hearts Lobby</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body class="lobby-page">
  <main>
    <section>
      <h1>Hearts Lobby</h1>
      <p class="muted">Set your player name, create a table, or pick one from Open Tables.</p>
      <div class="row">
        <input id="name" placeholder="Player name" />
      </div>
    </section>

    <section>
      <h2>Create Table</h2>
      <div class="row">
        <input id="newTableId" placeholder="Optional table id" />
        <button id="createTable">Create</button>
      </div>
      <div id="createResult" class="muted" style="margin-top:8px;"></div>
    </section>

    <section>
      <h2>Open Tables</h2>
      <ul id="tables"></ul>
    </section>
  </main>

  <script src="/assets/js/lobby/main.js" defer></script>
</body>
</html>
