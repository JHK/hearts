<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hearts Lobby</title>
  <style>
    :root {
      --bg: #edf3f8;
      --panel: #ffffff;
      --ink: #1c2b3a;
      --line: #d4e1ec;
      --muted: #5b6f83;
      --accent: #116466;
      --accent2: #d97b32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #ffffff, var(--bg));
      color: var(--ink);
      font-family: "Noto Sans", "Segoe UI", sans-serif;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 14px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(15, 34, 56, 0.08);
    }
    h1, h2 { margin: 0 0 10px; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.05rem; }
    .muted { color: var(--muted); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 220px;
      font-size: 1rem;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(130deg, var(--accent), #1b8d8f);
    }
    button.alt {
      background: linear-gradient(130deg, var(--accent2), #e7a162);
    }
    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }
    li {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    @media (max-width: 640px) {
      input, button { width: 100%; }
      li { align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Hearts Lobby</h1>
      <p class="muted">Set your player name, create a table, or join one.</p>
      <div class="row">
        <input id="name" placeholder="Player name" />
      </div>
    </section>

    <section>
      <h2>Create Table</h2>
      <div class="row">
        <input id="newTableId" placeholder="Optional table id" />
        <button id="createTable">Create</button>
      </div>
      <div id="createResult" class="muted" style="margin-top:8px;"></div>
    </section>

    <section>
      <h2>Join Table</h2>
      <div class="row">
        <input id="joinTableId" placeholder="Table id" />
        <button id="joinTable" class="alt">Join</button>
      </div>
      <div id="joinResult" class="muted" style="margin-top:8px;"></div>
    </section>

    <section>
      <h2>Open Tables</h2>
      <ul id="tables"></ul>
    </section>
  </main>

  <script>
    const nameKey = 'hearts.player.name';
    const tokenKey = 'hearts.player.token';

    const nameEl = document.getElementById('name');
    const newTableIdEl = document.getElementById('newTableId');
    const joinTableIdEl = document.getElementById('joinTableId');
    const createResultEl = document.getElementById('createResult');
    const joinResultEl = document.getElementById('joinResult');
    const tablesEl = document.getElementById('tables');

    function ensureToken() {
      let token = localStorage.getItem(tokenKey);
      if (!token) {
        token = (self.crypto && self.crypto.randomUUID) ? self.crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
        localStorage.setItem(tokenKey, token);
      }
      return token;
    }

    function getName() {
      const name = nameEl.value.trim();
      return name || 'Player';
    }

    function storeIdentity() {
      localStorage.setItem(nameKey, getName());
      ensureToken();
    }

    function openTable(tableId) {
      if (!tableId) {
        joinResultEl.textContent = 'table id is required';
        return;
      }
      storeIdentity();
      window.location.href = '/table/' + encodeURIComponent(tableId);
    }

    async function fetchTables() {
      const res = await fetch('/api/tables');
      const data = await res.json();
      const tables = data.tables || [];

      if (tables.length === 0) {
        tablesEl.innerHTML = '<li class="muted">No open tables yet.</li>';
        return;
      }

      tablesEl.innerHTML = '';
      for (const table of tables) {
        const li = document.createElement('li');
        const info = document.createElement('div');
        const state = table.started ? 'in_round' : 'waiting';
        info.textContent = `${table.table_id} (${table.players}/${table.max_players}, ${state})`;

        const btn = document.createElement('button');
        btn.textContent = 'Join';
        btn.onclick = () => openTable(table.table_id);

        li.appendChild(info);
        li.appendChild(btn);
        tablesEl.appendChild(li);
      }
    }

    async function createTable() {
      const payload = { table_id: newTableIdEl.value.trim() };
      const res = await fetch('/api/tables', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.error) {
        createResultEl.textContent = data.error;
        return;
      }
      createResultEl.textContent = data.created ? `created ${data.table_id}` : `using existing ${data.table_id}`;
      openTable(data.table_id);
    }

    document.getElementById('createTable').onclick = createTable;
    document.getElementById('joinTable').onclick = () => openTable(joinTableIdEl.value.trim());

    nameEl.value = localStorage.getItem(nameKey) || 'Player';
    ensureToken();
    fetchTables();
    setInterval(fetchTables, 1500);
  </script>
</body>
</html>
